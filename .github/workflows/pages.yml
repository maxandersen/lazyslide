name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq graphviz mscgen gnuplot

      - name: Install diagram tools
        run: mise run install-diagram-tools

      - name: Render slides
        run: |
          set -euo pipefail

          themes=(beige black blood dracula league moon night serif simple sky solarized white)
          build_root="${RUNNER_TEMP}/lazyslide-pages"
          rm -rf "$build_root" public
          mkdir -p "$build_root" public

          for theme in "${themes[@]}"; do
            out="$build_root/$theme"
            jbang lazyslide.java -o "$out" -Rtheme="$theme" render README.adoc
            mv "$out/README.html" "$out/index.html"
            mv "$out" "public/$theme"
          done

          cat > public/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>lazyslide themes</title>
              <style>
                body { font-family: system-ui, sans-serif; margin: 2rem; line-height: 1.5; }
                ul { columns: 2; max-width: 40rem; }
                a { text-decoration: none; }
              </style>
            </head>
            <body>
              <h1>lazyslide theme previews</h1>
              <p>Pick a reveal.js theme:</p>
              <ul>
          EOF
          for theme in "${themes[@]}"; do
            printf '                <li><a href="%s/">%s</a></li>\n' "$theme" "$theme"
          done
          cat >> public/index.html <<'EOF'
              </ul>
            </body>
          </html>
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
