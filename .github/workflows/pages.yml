name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq graphviz mscgen gnuplot

      - name: Install diagram tools
        run: mise run install-diagram-tools

      - name: Render slides
        run: |
          set -euo pipefail

          rm -rf public
          jbang lazyslide.java -o public render README.adoc
          mv public/README.html public/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
